<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1 Live Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
<h1>F1 Live Tracker</h1>
<div class="toolbar">
<select id="sessionPicker">
<option>Current Session</option>
<option>Latest Race</option>
<option>Qualifying</option>
<option>Practice</option>
</select>
<button id="refreshBtn">Refresh</button>
<span id="status">Loading...</span>
</div>
<table id="leaderboard">
<thead><tr><th>Pos</th><th>Driver</th><th>Gap</th><th>Last Lap</th></tr></thead>
<tbody></tbody>
</table>
</div>
<script src="app.js"></script>
</body>
</html>
